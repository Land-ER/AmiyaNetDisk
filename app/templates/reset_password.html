{% extends "base.html" %}
{% block title %}找回密码 - AmiyaNetDisk{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">找回密码</h1>
        <form method="POST" action="{{ url_for('auth.reset_password') }}" class="auth-form" id="resetForm">
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" name="email" class="form-input" placeholder="请输入注册邮箱" id="email" value="{{ email or '' }}" required>
            </div>
            <div class="form-group">
                <label for="code">验证码</label>
                <div class="code-group">
                    <input type="text" name="code" class="form-input code-input" placeholder="6位数字验证码" id="code" maxlength="6" required>
                    <button type="button" class="btn btn-outline" id="sendCodeBtn" onclick="sendCode()">发送验证码</button>
                </div>
            </div>
            <div class="form-group">
                <label for="password">新密码</label>
                <input type="password" name="password" class="form-input" placeholder="请输入新密码" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">重置密码</button>
        </form>
        <p class="auth-link">
            <a href="{{ url_for('auth.login') }}">返回登录</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let codeTimer = null;
let codeCountdown = 0;

function sendCode() {
    const email = document.getElementById('email').value;
    const btn = document.getElementById('sendCodeBtn');

    if (!email || !email.includes('@')) {
        alert('请输入有效的邮箱地址');
        return;
    }

    if (codeCountdown > 0) return;

    btn.disabled = true;
    btn.textContent = '发送中...';

    fetch('{{ url_for("auth.send_code") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: email})
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            codeCountdown = 60;
            btn.textContent = '60秒后重发';
            codeTimer = setInterval(() => {
                codeCountdown--;
                if (codeCountdown <= 0) {
                    clearInterval(codeTimer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                } else {
                    btn.textContent = codeCountdown + '秒后重发';
                }
            }, 1000);
        } else {
            alert(data.message);
            btn.disabled = false;
            btn.textContent = '发送验证码';
        }
    })
    .catch(() => {
        alert('发送失败，请稍后重试');
        btn.disabled = false;
        btn.textContent = '发送验证码';
    });
}

document.getElementById('resetForm')?.addEventListener('submit', function(e) {
    var pwd = document.getElementById('password');
    if (!pwd || pwd.dataset.hashed) return;
    e.preventDefault();
    var form = this;
    function submitForm() {
        HTMLFormElement.prototype.submit.call(form);
    }
    if (typeof hashPassword !== 'function') {
        pwd.dataset.hashed = 'true';
        submitForm();
        return;
    }
    hashPassword(pwd.value).then(function(hash) {
        pwd.value = hash;
        pwd.dataset.hashed = 'true';
        submitForm();
    }).catch(function() {
        pwd.dataset.hashed = 'true';
        submitForm();
    });
});
</script>
{% endblock %}
